<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Not written yet — Nigel's Library</title>
<style>
  :root {
    --bg1: #0b0e1a; --bg2: #131829;
    --ink: #e8e3d6; --muted: #9a96a8; --accent: #d4b878; --rule: #2a3048;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: Georgia, 'Times New Roman', serif; color: var(--ink);
         background: linear-gradient(180deg, var(--bg1), var(--bg2)); min-height: 100vh;
         line-height: 1.6; }
  main { max-width: 620px; margin: 0 auto; padding: 90px 20px 40px; }
  .kicker { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px;
            letter-spacing: 3px; text-transform: uppercase; color: var(--accent); }
  h1 { font-size: 32px; font-weight: 600; margin: 8px 0 14px; }
  p { font-size: 18px; }
  .muted { color: var(--muted); }
  a { color: var(--accent); }
</style>
</head>
<body>
<main>
  <div class="kicker">Nigel's Library</div>
  <h1>This page isn't written yet</h1>
  <p>The library is still being catalogued. If a QR code inside a book, CD or film brought you
  here, that item's own page will appear as the collection finds its new homes — please try
  again in a little while.</p>
  <p class="muted"><a href="/">Return to the library →</a></p>
</main>
</body>
</html>
